<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
    {{ $desc := .Description | default .Params.description | default site.Params.description }}
    <meta name="description" content="{{ $desc }}">
    <meta name="theme-color" content="#111214">
    <link rel="canonical" href="{{ .Permalink }}">

    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}">
    <meta property="og:description" content="{{ $desc }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:site_name" content="{{ site.Title }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}">
    <meta name="twitter:description" content="{{ $desc }}">

    <link rel="shortcut icon" href="{{ "assets/images/logo.ico" | relURL }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ "assets/css/style.css" | relURL }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    {{- /* Syntax highlighting CSS if needed */ -}}
    {{ if .IsPage }}
    <link rel="stylesheet" href="{{ "assets/css/syntax.css" | relURL }}">
    {{ end }}
</head>

<body>
